name: HA GitOps
version: 0.5.0
slug: ha_git_ops
description: ArgoCD-style GitOps reconciler — incoming commits and click-ops drift surface as diffs for a human to apply or promote
url: https://github.com/TMaYaD/ha-git-ops
arch:
  - aarch64
  - amd64
init: false
map:
  - homeassistant_config:rw
hassio_api: true
hassio_role: manager
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:source-branch-sync
panel_title: GitOps
options:
  repo_url: ""
  branch: main
  subfolder: home-assistant/config
  poll_interval: 120
  auto_refresh: true
  auto_apply: false
  auto_restart_core: false
  commit_name: ha-git-ops
  commit_email: ha-git-ops@homelab.local
  notify_drift: true
  notify_service: ""
schema:
  repo_url: str
  branch: str
  subfolder: str
  poll_interval: int(30,3600)
  auto_refresh: bool
  auto_apply: bool
  auto_restart_core: bool
  commit_name: str
  commit_email: str
  notify_drift: bool
  notify_service: str
